<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑车动画</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(45deg, #1a1a2e, #16213e);
        }
        
        .car-container {
            width: 200px;
            height: 200px;
            position: fixed;
            top: 0;
            left: 0;
            background-image: url('https://ts1.tc.mm.bing.net/th/id/R-C.192f04d8964c8883b3cade1c0f383c81?rik=h0nNd1w0b7hkvg&riu=http%3a%2f%2f5b0988e595225.cdn.sohucs.com%2fimages%2f20180706%2f406c6c1ec2eb4c6b80ff857bc2c2a16f.jpeg&ehk=qsuTZQgo01GeYQNMbjOGgj%2fnfY5u%2fFzpbh0BSAWb%2fEI%3d&risl=&pid=ImgRaw&r=0');
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            
            /* 动画设置 */
            animation: drive 5s cubic-bezier(0.1, 0.8, 0.9, 0.1) forwards;
        }
        
        @keyframes drive {
            0% {
                top: 0;
                left: 0;
                transform: scale(1.2) rotate(0deg);
                opacity: 1;
            }
            70% {
                top: calc(100vh - 200px);
                left: calc(100vw - 200px);
                transform: scale(1.2) rotate(0deg);
                opacity: 1;
            }
            85% {
                top: calc(100vh - 200px - 30px);
                left: calc(100vw - 200px - 30px);
                transform: scale(1.1) rotate(5deg);
                opacity: 0.9;
            }
            95% {
                top: calc(100vh - 200px - 10px);
                left: calc(100vw - 200px - 10px);
                transform: scale(1.05) rotate(2deg);
                opacity: 0.95;
            }
            100% {
                top: calc(100vh - 200px);
                left: calc(100vw - 200px);
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="car-container"></div>
</body>
</html>
